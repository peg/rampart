name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.24.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race "-coverprofile=coverage.out" ./...

      - name: Build
        run: go build -v ./cmd/rampart

      - name: OpenClaw plugin regression tests
        if: runner.os != 'Windows'
        run: |
          node internal/plugin/openclaw/smoke-test.mjs
          node internal/plugin/openclaw/approval-regression.mjs
          node internal/plugin/openclaw/degraded-mode-test.mjs

      - name: Policy check (standard)
        run: go run ./cmd/rampart policy check --config policies/standard.yaml

      - name: Policy check (paranoid)
        run: go run ./cmd/rampart policy check --config policies/paranoid.yaml

      - name: Policy check (yolo)
        run: go run ./cmd/rampart policy check --config policies/yolo.yaml

      - name: Vulnerability check
        continue-on-error: true
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Benchmark
        if: runner.os != 'Windows'
        run: go test -bench=. -benchmem ./internal/engine/ ./internal/audit/

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out

  release-dry-run:
    name: goreleaser snapshot (cross-platform build check)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.13'

      - name: GoReleaser snapshot (all platforms, no publish)
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
