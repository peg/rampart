name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.25.9']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race "-coverprofile=coverage.out" ./...

      - name: Build
        run: go build -v ./cmd/rampart

      - name: Installer scripts are synced
        if: runner.os == 'Linux'
        run: |
          cmp -s install.sh docs/install
          cmp -s install.sh docs/install.sh
          cmp -s install.sh scripts/install.sh
          sh -n install.sh
          sh -n docs/install
          sh -n docs/install.sh
          sh -n scripts/install.sh

      - name: OpenClaw plugin regression tests
        if: runner.os != 'Windows'
        run: |
          node internal/plugin/openclaw/smoke-test.mjs
          node internal/plugin/openclaw/approval-regression.mjs
          node internal/plugin/openclaw/degraded-mode-test.mjs

      - name: Policy check (standard)
        run: go run ./cmd/rampart policy check --config policies/standard.yaml

      - name: Policy check (paranoid)
        run: go run ./cmd/rampart policy check --config policies/paranoid.yaml

      - name: Policy check (yolo)
        run: go run ./cmd/rampart policy check --config policies/yolo.yaml

      - name: Vulnerability check
        continue-on-error: true
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0 && govulncheck ./...

      - name: Benchmark
        if: runner.os != 'Windows'
        run: go test -bench=. -benchmem ./internal/engine/ ./internal/audit/

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out

  docker-smoke:
    name: docker smoke (amd64 runtime + arm64 build)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - name: Build amd64 image
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64 \
            --load \
            --build-arg VERSION=ci-smoke \
            --build-arg COMMIT=${GITHUB_SHA::12} \
            --build-arg DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            -t rampart:ci-smoke \
            .

      - name: Smoke test amd64 image
        run: |
          set -euo pipefail

          docker run --rm rampart:ci-smoke version | tee /tmp/rampart-docker-version.txt
          grep -F "rampart ci-smoke" /tmp/rampart-docker-version.txt

          cid="$(docker run -d -p 19090:9090 rampart:ci-smoke)"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:19090/healthz >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done

          docker logs "$cid"
          exit 1

      - name: Build arm64 image
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/arm64 \
            --build-arg VERSION=ci-smoke \
            --build-arg COMMIT=${GITHUB_SHA::12} \
            --build-arg DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --output=type=cacheonly \
            .

  release-dry-run:
    name: goreleaser snapshot (cross-platform build check)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'

      - name: GoReleaser snapshot (all platforms, no publish)
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
