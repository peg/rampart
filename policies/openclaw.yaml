# rampart-policy-version: 1.0.0
# Rampart built-in profile: openclaw
# Use with: rampart init --profile openclaw
#
# Policy profile for OpenClaw AI agent environments.
# Covers OpenClaw's full tool surface: read, write, edit, exec,
# web_fetch, web_search, browser, message, canvas.
#
# Philosophy: deny by default, allow known-safe operations explicitly.
# Designed to be layered with standard.yaml for comprehensive protection.
#
# Prerequisites:
#   rampart setup openclaw --plugin   (native hook interception, recommended)
#   rampart setup openclaw --patch-tools  (legacy dist patching)

version: "1"
default_action: ask

policies:
  # ── Self-modification protection ──────────────────────────────────────
  # Agents cannot modify their own Rampart policy or disable enforcement.
  - name: block-self-modification
    description: "Prevent AI agents from modifying their own Rampart policy"
    match:
      tool: ["exec"]
    rules:
      - action: allow
        when:
          command_contains:
            - "rampart serve stop"
            - "rampart serve install"
            - "rampart serve uninstall"
            - "rampart version"
            - "rampart status"
            - "rampart doctor"
            - "rampart log"
            - "rampart watch"
            - "rampart convert"
        message: "Read-only Rampart commands allowed"
      - action: deny
        when:
          command_contains:
            - "rampart allow"
            - "rampart block"
            - "rampart rules"
            - "rampart policy"
            - "rampart init"
            - "rampart setup"
            - "rampart serve"
            - "rampart upgrade"
        message: "Policy modification must be run by a human, not an agent"
      - action: deny
        when:
          command_contains:
            - "> .rampart/"
            - "> ~/.rampart/"
            - ">> .rampart/"
            - ">> ~/.rampart/"
        message: "Direct writes to .rampart/ directory blocked"

  # ── Safe workspace reads ───────────────────────────────────────────────
  # Allow reading workspace files and common project files.
  - name: allow-workspace-reads
    description: "Allow reading workspace and project files"
    match:
      tool: ["read"]
    rules:
      - action: allow
        when:
          path_matches:
            # Workspace files
            - "**/.openclaw/workspace/**"
            - "**/workspace/**"
            # Common project files
            - "**/*.go"
            - "**/*.ts"
            - "**/*.js"
            - "**/*.py"
            - "**/*.md"
            - "**/*.yaml"
            - "**/*.yml"
            - "**/*.json"
            - "**/*.toml"
            - "**/*.txt"
            - "**/*.sh"
            - "**/*.rs"
            - "**/*.html"
            - "**/*.css"
            - "**/*.sql"
            - "**/*.env.example"
          path_not_matches:
            # Block credentials even within workspace
            - "**/.ssh/id_*"
            - "**/.aws/credentials"
            - "**/.kube/config"
            - "**/.docker/config.json"
            - "**/.git-credentials"
            - "**/.netrc"
            - "**/.env"
            - "**/.env.*"
        message: "Workspace file read allowed"

  # ── Memory and log file writes ─────────────────────────────────────────
  # Allow writing to memory files, daily logs, and workspace outputs.
  - name: allow-workspace-writes
    description: "Allow writing memory files, logs, and workspace outputs"
    match:
      tool: ["write", "edit"]
    rules:
      - action: allow
        when:
          path_matches:
            # Memory and daily notes
            - "**/memory/**"
            - "**/memory/*.md"
            - "**/MEMORY.md"
            - "**/HEARTBEAT.md"
            # Workspace outputs
            - "**/.openclaw/workspace/**"
            - "**/workspace/**"
            # Common project files (safe to write)
            - "**/*.go"
            - "**/*.ts"
            - "**/*.js"
            - "**/*.py"
            - "**/*.md"
            - "**/*.yaml"
            - "**/*.yml"
            - "**/*.json"
            - "**/*.toml"
            - "**/*.txt"
            - "**/*.sh"
            - "**/*.rs"
            - "**/*.html"
            - "**/*.css"
            - "**/*.sql"
          path_not_matches:
            # Never write credentials or identity files via subagent
            - "**/.ssh/**"
            - "**/.aws/**"
            - "**/.gnupg/**"
            - "**/.rampart/**"
            - "**/SOUL.md"
            - "**/IDENTITY.md"
            - "**/.openclaw/openclaw.json"
        message: "Workspace file write allowed"

  # ── Safe exec commands ─────────────────────────────────────────────────
  # Allow common development and system commands.
  - name: allow-safe-exec
    description: "Allow common dev tools and shell operations"
    match:
      tool: ["exec"]
    rules:
      - action: allow
        when:
          command_matches:
            # Go toolchain
            - "go build *"
            - "go test *"
            - "go run *"
            - "go fmt *"
            - "go vet *"
            - "go mod *"
            - "go get *"
            - "go install *"
            - "go generate *"
            # Safe git subcommands only — not force-push, branch deletion, remote manipulation
            - "git status*"
            - "git log*"
            - "git diff*"
            - "git show*"
            - "git add*"
            - "git commit*"
            - "git checkout*"
            - "git switch*"
            - "git branch*"
            - "git fetch*"
            - "git pull*"
            - "git push origin *"
            - "git stash*"
            - "git tag*"
            - "git clone*"
            - "git init*"
            - "git remote -v"
            - "git remote get-url*"
            - "git worktree*"
            - "git merge*"
            - "git rebase*"
            - "git reset*"
            - "git revert*"
            # Node/npm/yarn
            - "node *"
            - "npm *"
            - "yarn *"
            - "npx *"
            - "pnpm *"
            # Python
            - "python *"
            - "python3 *"
            - "pip *"
            - "pip3 *"
            # Common CLI tools
            - "ls *"
            - "ls"
            - "cat *"
            - "echo *"
            - "grep *"
            - "rg *"
            - "find *"
            - "head *"
            - "tail *"
            - "wc *"
            - "sort *"
            - "uniq *"
            - "cut *"
            - "awk *"
            - "sed *"
            - "tr *"
            - "diff *"
            - "cp *"
            - "mv *"
            - "mkdir *"
            - "touch *"
            - "chmod *"
            - "pwd"
            - "date"
            - "which *"
            - "type *"
            - "env"
            - "printenv *"
            - "jq *"
            - "yq *"
            - "make *"
            # Safe docker subcommands — not run --privileged, not rm, not system prune
            - "docker build*"
            - "docker images*"
            - "docker ps*"
            - "docker logs*"
            - "docker inspect*"
            - "docker pull*"
            - "docker tag*"
            - "docker push*"
            - "docker compose*"
            - "docker-compose*"
            # Safe kubectl subcommands — not delete, not apply to prod namespaces
            - "kubectl get*"
            - "kubectl describe*"
            - "kubectl logs*"
            - "kubectl apply*"
            - "kubectl diff*"
            - "kubectl config*"
            - "kubectl version*"
            - "kubectl cluster-info*"
            # Local curl/wget only — network requests should use web_fetch
            - "curl http://localhost*"
            - "curl https://localhost*"
            - "curl http://127.0.0.1*"
            - "curl https://127.0.0.1*"
            - "curl http://0.0.0.0*"
            - "wget http://localhost*"
            - "wget https://localhost*"
            - "wget http://127.0.0.1*"
          command_not_matches:
            # Never allow force-push or branch deletion via git push
            - "git push *--force*"
            - "git push *-f *"
            - "git push *-f"
            - "git push *--delete*"
            - "git push *:*"
        message: "Safe exec command allowed"

  # ── Block external network exec ─────────────────────────────────────────
  # curl/wget to external destinations should use web_fetch (policy-aware).
  # This catches exec-based exfiltration bypassing web_fetch domain rules.
  - name: block-external-network-exec
    description: "Block curl/wget to external hosts via exec — use web_fetch instead"
    match:
      tool: ["exec"]
    rules:
      - action: deny
        when:
          command_matches:
            - "curl *"
            - "wget *"
          command_not_matches:
            # Allow localhost/loopback
            - "curl http://localhost*"
            - "curl https://localhost*"
            - "curl http://127.0.0.1*"
            - "curl https://127.0.0.1*"
            - "curl http://0.0.0.0*"
            - "wget http://localhost*"
            - "wget https://localhost*"
            - "wget http://127.0.0.1*"
            # Allow rampart learn endpoint specifically
            - "curl*http://localhost:9090/v1/*"
        message: "External curl/wget blocked — use web_fetch tool for external requests (policy-aware)"

  # ── Block force-push ───────────────────────────────────────────────────
  # Dedicated deny for force-push variants so compound commands
  # (e.g. "echo x && git push --force") can't bypass allow-rule exclusions.
  - name: block-force-push
    description: "Block git force-push and branch deletion regardless of command context"
    match:
      tool: ["exec"]
    rules:
      - action: deny
        when:
          command_matches:
            - "git push *--force*"
            - "git push *-f *"
            - "git push *-f"
            - "git push *--delete*"
            - "*git push *--force*"
            - "*git push *-f *"
            - "*git push *-f"
            - "*git push *--delete*"
        message: "Git force-push and branch deletion blocked — run manually if intentional"

  # ── Block destructive exec ─────────────────────────────────────────────
  - name: block-destructive-exec
    description: "Block destructive filesystem and system commands"
    match:
      tool: ["exec"]
    rules:
      - action: deny
        when:
          command_matches:
            - "rm -rf /*"
            - "rm -rf ~/*"
            - "rm -rf /"
            - "rm -rf ~"
            - "mkfs*"
            - "> /dev/sda"
            - "dd **of=/dev/**"
            - ":(){ :|:& };:"
        message: "Destructive command blocked"

  # ── Block credential access ────────────────────────────────────────────
  - name: block-credential-reads
    description: "Block access to SSH keys, cloud credentials, and secret files"
    match:
      tool: ["read"]
    rules:
      - action: ask
        when:
          path_matches:
            # AWS credentials file contains secrets — require approval
            - "**/.aws/credentials"
            # kube/docker configs contain auth tokens — require approval
            - "**/.kube/config"
            - "**/.docker/config.json"
            # .env files may contain secrets — require approval
            - "**/.env"
            - "**/.env.*"
          path_not_matches:
            - "**/.ssh/*.pub"
            - "**/.env.example"
            - "**/.env.sample"
            - "**/.env.template"
            - "**/.env.local.example"
        message: "Credential file — human approval required before agent reads this"
      - action: deny
        when:
          path_matches:
            # Absolute denies — no legitimate agent use case
            - "**/.ssh/id_*"
            - "**/.git-credentials"
            - "**/.netrc"
            - "**/.gnupg/**"
            - "**/etc/shadow"
            - "**/etc/passwd"
          path_not_matches:
            - "**/.ssh/*.pub"
        message: "Credential file access blocked"
      - action: allow
        when:
          path_matches:
            # AWS config (not credentials) — region/profile metadata, not secrets
            - "**/.aws/config"
        message: "AWS config (non-secret metadata) allowed"

  # ── web_fetch: allow known-safe domains ───────────────────────────────
  # Allow fetches to common dev/research domains; block exfil destinations.
  - name: allow-safe-web-fetch
    description: "Allow web_fetch to known-safe domains"
    match:
      tool: ["fetch", "web_fetch"]
    rules:
      - action: allow
        when:
          domain_matches:
            # Package registries and docs
            - "pkg.go.dev"
            - "docs.rs"
            - "crates.io"
            - "npmjs.com"
            - "*.npmjs.com"
            - "pypi.org"
            # Developer resources
            - "github.com"
            - "*.github.com"
            - "raw.githubusercontent.com"
            - "api.github.com"
            - "docs.github.com"
            - "stackoverflow.com"
            - "*.stackoverflow.com"
            # Search and reference
            - "duckduckgo.com"
            - "google.com"
            - "wikipedia.org"
            - "*.wikipedia.org"
            - "developer.mozilla.org"
            # OpenClaw and Rampart related
            - "rampart.sh"
            - "*.rampart.sh"
            # LLM APIs (agents may need these)
            - "api.anthropic.com"
            - "api.openai.com"
        message: "Web fetch to known-safe domain allowed"
      - action: ask
        when:
          domain_matches:
            # Common dev/testing services — require approval (legitimate but risky)
            - "*.ngrok.io"
            - "ngrok.io"
            - "*.ngrok-free.app"
            - "ngrok-free.app"
            - "*.webhook.site"
            - "webhook.site"
            - "*.requestbin.com"
            - "*.hookbin.com"
            - "*.pipedream.net"
            - "*.beeceptor.com"
        message: "Web request to tunneling/webhook service — requires human approval (potential exfiltration risk)"

  # ── web_search: always allow ───────────────────────────────────────────
  - name: allow-web-search
    description: "Allow web_search tool (read-only, no exfiltration risk)"
    match:
      tool: ["web_search"]
    rules:
      - action: allow
        when:
          default: true
        message: "Web search allowed"

  # ── browser: allow known-safe + watch unknown domains ─────────────────
  - name: allow-safe-browser
    description: "Allow browser navigation to known-safe domains"
    match:
      tool: ["browser"]
    rules:
      - action: allow
        when:
          domain_matches:
            # Discord / Telegram for OpenClaw message plugin UIs
            - "discord.com"
            - "*.discord.com"
            - "telegram.org"
            - "*.telegram.org"
            - "web.telegram.org"
            # Developer portals
            - "github.com"
            - "*.github.com"
            - "localhost"
            - "127.0.0.1"
            - "*.local"
        message: "Browser navigation to known-safe domain allowed"

  # ── watch-browser-navigation: audit unknown domain visits ─────────────
  # Log browser tool calls to unknown/unclassified domains for audit visibility.
  - name: watch-browser-navigation
    description: "Audit browser navigation to unknown domains"
    match:
      tool: ["browser"]
    rules:
      - action: watch
        when:
          default: true
        message: "Browser navigation to unclassified domain logged for audit"

  # ── message: allow read actions, ask for sends to unknown targets ──────
  - name: allow-safe-message
    description: "Allow message reads freely; sends to unknown targets require approval"
    match:
      tool: ["message"]
    rules:
      - action: allow
        when:
          params_match:
            action: ["read", "list-pins", "reactions", "thread-list", "channel-list", "channel-info", "member-info", "role-info", "emoji-list"]
        message: "Message read action allowed"
      - action: allow
        when:
          params_match:
            action: ["send", "edit", "delete", "react", "pin", "unpin", "thread-reply", "thread-create"]
            channel: ["discord", "telegram", "slack"]
        message: "Message send to known channel allowed"

  # ── canvas: allow all canvas operations ───────────────────────────────
  # Canvas is presentation/UI only — low risk.
  - name: allow-canvas
    description: "Allow canvas operations (presentation/UI, low risk)"
    match:
      tool: ["canvas"]
    rules:
      - action: allow
        when:
          default: true
        message: "Canvas operation allowed"

  # ── sessions_spawn: subagent spawning guard ───────────────────────────
  # Agents can spawn subagents but not into unrestricted agent IDs.
  # Subagents themselves cannot spawn further agents (depth limit).
  - name: sessions-spawn-guard
    description: "Allow agent spawning with depth guard — subagents cannot spawn"
    match:
      tool: ["sessions_spawn"]
    rules:
      - action: deny
        when:
          session_matches: ["subagent:*"]
        message: "Subagents cannot spawn further agents (depth limit enforced)"
      - action: allow
        when:
          default: true
        message: "Agent spawn allowed from main session"

  # ── Subagent write guard ───────────────────────────────────────────────
  # Subagents cannot modify identity/config files.
  - name: openclaw-subagent-write-guard
    description: "Restrict subagent write access to identity and config files"
    priority: 10
    match:
      tool: ["write", "edit"]
    rules:
      - action: deny
        when:
          session_matches: ["subagent:*", "cron:*"]
          path_matches:
            - "**/SOUL.md"
            - "**/IDENTITY.md"
            - "**/USER.md"
            - "**/AGENTS.md"
            - "**/.openclaw/openclaw.json"
        message: "Subagents cannot modify identity or config files"

  # ── Response scanning ──────────────────────────────────────────────────
  # Block credentials from leaking into agent context.
  - name: block-credential-in-response
    description: "Block secrets in tool responses before they enter agent context"
    match:
      tool: ["read", "exec", "web_fetch"]
    rules:
      - action: deny
        when:
          response_matches:
            - "AKIA[0-9A-Z]{16}"
            - "ASIA[0-9A-Z]{16}"
            - "-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----"
            - "ghp_[a-zA-Z0-9]{36}"
            - "github_pat_[a-zA-Z0-9_]{80,}"
            - "sk-[a-zA-Z0-9]{20,}"
        message: "Response blocked: contains credentials"

  # NOTE: default_action: ask means any unmatched tool call surfaces for
  # human review rather than silently failing. This is intentional — it
  # reduces false positives for novel tools and operations not yet in the
  # allowlist while maintaining oversight.
